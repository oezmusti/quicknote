<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickNotes</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar panel">
            <div class="panel-header">
                <h1>QuickNotes</h1>
            </div>

            <div class="folder-actions">
                <button id="add-folder-btn" class="btn btn-primary">+ Ordner</button>
            </div>

            <div class="export-import-actions">
                <button id="export-btn" class="btn">Export JSON</button>
                <button id="import-btn" class="btn">Import JSON</button>
                <input id="import-file" type="file" accept="application/json" hidden />
            </div>

            <section class="folders-section">
                <div class="section-title">Ordner</div>
                <ul id="folder-list" class="folder-list"></ul>
            </section>
        </aside>

        <main class="notes-column panel">
            <div class="panel-header notes-header">
                <h2>Notizen</h2>
                <button id="add-note-btn" class="btn btn-primary">+ Notiz</button>
            </div>

            <div class="search-wrap">
                <input id="search-input" type="search" placeholder="Suche nach Titel oder Inhalt..." />
            </div>

            <ul id="notes-list" class="notes-list"></ul>
        </main>

        <section class="editor-column panel">
            <div class="panel-header editor-header">
                <h2>Editor</h2>
                <button id="delete-note-btn" class="btn btn-danger" disabled>Notiz löschen</button>
            </div>

            <div id="editor-empty" class="empty-state">
                <p>Wähle eine Notiz aus oder erstelle eine neue Notiz.</p>
            </div>

            <div id="editor-area" class="editor-area hidden">
                <label for="note-title">Titel</label>
                <input id="note-title" type="text" placeholder="Titel der Notiz" />

                <label for="note-folder">Ordner</label>
                <select id="note-folder"></select>

                <div class="meta-row">
                    <span id="created-at">Erstellt: –</span>
                    <span id="updated-at">Geändert: –</span>
                </div>

                <div class="toolbar" id="editor-toolbar">
                    <button type="button" class="tool-btn" data-command="bold" title="Fett"><b>B</b></button>

                    <div class="tool-group">
                        <button type="button" class="tool-btn color" data-color="#3B82F6" style="--swatch:#3B82F6"
                            title="Blau"></button>
                        <button type="button" class="tool-btn color" data-color="#EAB308" style="--swatch:#EAB308"
                            title="Gelb"></button>
                        <button type="button" class="tool-btn color" data-color="#22C55E" style="--swatch:#22C55E"
                            title="Grün"></button>
                        <button type="button" class="tool-btn color" data-color="#EF4444" style="--swatch:#EF4444"
                            title="Rot"></button>
                        <button type="button" class="tool-btn color" data-color="#EC4899" style="--swatch:#EC4899"
                            title="Pink"></button>
                        <button type="button" class="tool-btn color" data-color="#F97316" style="--swatch:#F97316"
                            title="Orange"></button>
                    </div>

                    <div class="tool-group">
                        <button type="button" class="tool-btn" data-size="headline">Headline</button>
                        <button type="button" class="tool-btn" data-size="subheadline">Subheadline</button>
                        <button type="button" class="tool-btn" data-size="text">Text</button>
                    </div>

                    <button type="button" id="insert-link-btn" class="tool-btn">Link</button>
                    <button type="button" id="insert-image-btn" class="tool-btn">Bild</button>
                    <input id="image-input" type="file" accept="image/*" hidden />
                </div>

                <div id="note-content" class="note-content" contenteditable="true"></div>
            </div>
        </section>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>

</html>
